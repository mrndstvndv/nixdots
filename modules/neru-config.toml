# Neru default configuration
# Copy to ~/.config/neru/config.toml to customize.

# Full config reference: https://github.com/y3owk1n/neru/blob/main/docs/CONFIGURATION.md
# Full CLI reference: https://github.com/y3owk1n/neru/blob/main/docs/CLI.md

[general]
excluded_apps = []
kb_layout_to_use = ""
passthrough_unbounded_keys = false
should_exit_after_passthrough = false
passthrough_unbounded_keys_blacklist = []
hide_overlay_in_screen_share = false

[theme.light]
surface = "#EEF2FF"
accent = "#465FBC"
accent_alt = "#0B2377"
on_accent_alt = "#F8FAFF"
text = "#17327A"

[theme.dark]
surface = "#0A1338"
accent = "#6E82D6"
accent_alt = "#8FA2F0"
on_accent_alt = "#081022"
text = "#E8EEFF"

[hotkeys]
"Primary+Shift+Space" = "hints"
"Primary+Shift+G" = "grid"
"Primary+Shift+C" = "recursive_grid"
"Primary+Shift+S" = "scroll"

[hints]
enabled = true
strategy = "axtree"
hint_characters = "asdfghjkl"
max_depth = 50
include_menubar_hints = false
additional_menubar_hints_targets = [
    "com.apple.TextInputMenuAgent",
    "com.apple.controlcenter",
    "com.apple.systemuiserver",
    "com.y3owk1n.neru",
]
include_dock_hints = false
include_nc_hints = false
include_stage_manager_hints = false
include_pip_hints = false
include_screen_capture_hints = false
detect_mission_control = false
clickable_roles = [
    "AXButton",
	"AXMenuButton",
    "AXComboBox",
    "AXCheckBox",
    "AXRadioButton",
    "AXLink",
    "AXPopUpButton",
    "AXTextField",
    "AXSlider",
    "AXTabButton",
    "AXSwitch",
    "AXDisclosureTriangle",
    "AXTextArea",
    "AXMenuItem",
    "AXCell",
    "AXRow",
	"AXGenericElement",
]
ignore_clickable_check = false
visible_check_enabled = false

[hints.hotkeys]
"Escape" = "idle"
"/" = "action search_hints"
"Backspace" = "action backspace"
"Tab" = "action cycle_hint"
"Shift+Tab" = "action cycle_hint --backward"
"Shift+L" = "action left_click"
"Shift+R" = "action right_click"
"Shift+M" = "action middle_click"
"Shift+I" = "action mouse_down"
"Shift+U" = "action mouse_up"
"Up" = "action move_mouse_relative --dx=0 --dy=-10"
"Down" = "action move_mouse_relative --dx=0 --dy=10"
"Left" = "action move_mouse_relative --dx=-10 --dy=0"
"Right" = "action move_mouse_relative --dx=10 --dy=0"

[hints.additional_ax_support]
enable = false
additional_electron_bundles = []
additional_chromium_bundles = []
additional_firefox_bundles = []
additional_webkit_bundles = []

[hints.ui]
font_size = 10
font_family = ""
border_radius = -1
padding_x = -1
padding_y = -1
border_width = 1
placement = "bottom"

[hints.search_input_ui]
font_size = 10
font_family = ""
border_radius = -1
padding_x = -1
padding_y = -1
border_width = 1
position = "bottom_center"
x_offset = 0
y_offset = 24
width = 320

[hints.boundary_highlight]
enabled = false
border_width = 1
border_radius = -1

[hints.vision]
detect_text = true
detect_rectangles = true
request_timeout_ms = 5000
minimum_confidence = 0.0
merge_iou_threshold = 0.5
rectangle_max_candidates = 100
rectangle_min_size = 0.01
rectangle_min_aspect = 0.3
rectangle_max_aspect = 10.0
button_min_confidence = 0.3
button_min_aspect = 0.8
button_max_aspect = 8.0
button_icon_max_size = 48
link_min_aspect = 5.0
link_max_height = 40
link_min_width = 50
image_min_size = 48
checkbox_max_size = 32
generic_clickable_min_confidence = 0.5

[grid]
enabled = true
characters = "abcdefghijklmnpqrstuvwxyz"
sublayer_keys = "abcdefghijklmnpqrstuvwxyz"
live_match_update = true
hide_unmatched = true
prewarm_enabled = true
enable_gc = false

[grid.hotkeys]
"Escape" = "idle"
"`" = "toggle-cursor-follow-selection"
"Space" = "action reset"
"Backspace" = "action backspace"
"Shift+L" = "action left_click"
"Shift+R" = "action right_click"
"Shift+M" = "action middle_click"
"Shift+I" = "action mouse_down"
"Shift+U" = "action mouse_up"
"Up" = "action move_mouse_relative --dx=0 --dy=-10"
"Down" = "action move_mouse_relative --dx=0 --dy=10"
"Left" = "action move_mouse_relative --dx=-10 --dy=0"
"Right" = "action move_mouse_relative --dx=10 --dy=0"

[grid.ui]
font_size = 10
font_family = ""
border_width = 1

[recursive_grid]
enabled = true
grid_cols = 2
grid_rows = 2
keys = "uijk"
min_size_width = 25
min_size_height = 25
max_depth = 10

[recursive_grid.animation]
enabled = false
duration_ms = 180

[recursive_grid.hotkeys]
"Escape" = "idle"
"`" = "toggle-cursor-follow-selection"
"Space" = "action reset"
"Backspace" = "action backspace"
"Shift+L" = "action left_click"
"Shift+R" = "action right_click"
"Shift+M" = "action middle_click"
"Shift+I" = "action mouse_down"
"Shift+U" = "action mouse_up"
"Up" = "action move_mouse_relative --dx=0 --dy=-10"
"Down" = "action move_mouse_relative --dx=0 --dy=10"
"Left" = "action move_mouse_relative --dx=-10 --dy=0"
"Right" = "action move_mouse_relative --dx=10 --dy=0"

[recursive_grid.ui]
line_width = 1
font_size = 10
font_family = ""
label_background = false
label_background_padding_x = -1
label_background_padding_y = -1
label_background_border_radius = -1
label_background_border_width = 1
sub_key_preview = false
sub_key_preview_font_size = 8
sub_key_preview_autohide_multiplier = 1.5

[virtual_pointer]
enabled = true

[virtual_pointer.ui]
size = 3

[mouse_action_indicator]
enabled = false
actions = ["left_click", "right_click", "middle_click", "mouse_down", "mouse_up"]

[mouse_action_indicator.ui]
size = 36
border_width = 2
shape = "circle"

[mouse_action_indicator.animation]
duration_ms = 260
start_scale = 0.55
end_scale = 1.35
start_opacity = 0.85
end_opacity = 0.0
easing = "ease_out"

[scroll]
scroll_step = 50
scroll_step_half = 500
scroll_step_full = 1000000

[scroll.hotkeys]
"Escape" = "idle"
"k" = "action scroll_up"
"j" = "action scroll_down"
"h" = "action scroll_left"
"l" = "action scroll_right"
"gg" = "action go_top"
"Shift+G" = "action go_bottom"
"u" = "action page_up"
"PageUp" = "action page_up"
"d" = "action page_down"
"PageDown" = "action page_down"
"Shift+L" = "action left_click"
"Shift+R" = "action right_click"
"Shift+M" = "action middle_click"
"Shift+I" = "action mouse_down"
"Shift+U" = "action mouse_up"
"Up" = "action move_mouse_relative --dx=0 --dy=-10"
"Down" = "action move_mouse_relative --dx=0 --dy=10"
"Left" = "action move_mouse_relative --dx=-10 --dy=0"
"Right" = "action move_mouse_relative --dx=10 --dy=0"

[mode_indicator]

[mode_indicator.scroll]
enabled = true
text = "Scroll"

[mode_indicator.hints]
enabled = false
text = "Hints"

[mode_indicator.grid]
enabled = false
text = "Grid"

[mode_indicator.recursive_grid]
enabled = false
text = "Recursive Grid"

[mode_indicator.ui]
font_size = 10
font_family = ""
border_width = 1
padding_x = -1
padding_y = -1
border_radius = -1
indicator_x_offset = 20
indicator_y_offset = 20

[sticky_modifiers]
enabled = true
tap_max_duration = 300

[sticky_modifiers.ui]
font_size = 10
font_family = ""
border_width = 1
padding_x = -1
padding_y = -1
border_radius = -1
indicator_x_offset = -40
indicator_y_offset = 20

[smooth_cursor]
move_mouse_enabled = false
steps = 10
max_duration = 200
duration_per_pixel = 0.1

[smooth_scroll]
enabled = false
steps = 20
max_duration = 180
duration_per_pixel = 1.00

[systray]
enabled = true

[logging]
log_level = "info"
log_file = ""
disable_file_logging = true
max_file_size = 10
max_backups = 5
max_age = 30
